data:
  img_dir: "data/image"
  mask_dir: "data/mask"
  size: [1024, 1024]
  split_ratio: 0.1

dl:
  batch: 4
  num_workers: 0
  pin_memory: false

birefnet:
  weight: "weight/BiRefNet-general-epoch_244.pth"
  lateral_channels_in_collection: [1536, 768, 384, 192]
  mul_scl_ipt: "cat"
  dec_ipt: True
  dec_ipt_split: True
  ms_supervision: True
  out_ref: True

lora:
  rank: 8
  alpha: 16.0

trainer:
  lr: 0.0001
  steps: 1000
  val_freq: 50
  save_freq: 100  
